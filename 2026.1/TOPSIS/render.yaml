services:
  - type: web
    name: topsis-backend
    runtime: python
    plan: free
    rootDir: backend
    branch: main
    buildCommand: "pip install uv && uv sync --frozen"
    startCommand: "uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ALLOWED_ORIGINS
        sync: false
